<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Anasayfa</a>
        <a href="{{ '/blog.html' | relative_url }}">Blog</a>
        <a href="{{ '/iletisim.html' | relative_url }}">İletişim</a>

        <a href="{{ '/okuduklarim.html' | relative_url }}">Okuduklarım</a>
      </nav>
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
</body>
</html>
