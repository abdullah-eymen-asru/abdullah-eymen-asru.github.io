{% if site.giscus.repo_id and site.giscus.repo_id != "GISCUS_REPO_ID_BURAYA" %}
<div class="comments-section">
  <h2>Yorumlar</h2>
  <p class="format-hint">
    Yorum yapabilmek için GitHub hesabınla giriş yapman gerekiyor. Hiçbir
    ek kayıt/üyelik yok, sadece GitHub yetkilendirmesi yeterli.
  </p>
  <div id="giscus-container"></div>
  <script>
    (function () {
      // Sitenin o anki gerçek temasını kullanıyoruz, sabit değer değil.
      function guncelTema() {
        return document.documentElement.getAttribute("data-theme") === "dark"
          ? "dark"
          : "light";
      }

      // DÜZELTME (v2): Önceki iki yaklaşım da (postMessage-only, sonra
      // "her tema değişiminde iframe'i tamamen yık ve yeniden kur") görsel
      // bir bozulmaya yol açıyordu — ikinci yaklaşımda özellikle, iframe
      // kullanıcı GITHUB İLE GİRİŞ YAPMIŞKEN yeniden kurulduğunda, giscus
      // kısa bir an için oturumu/yüksekliği yeniden hesaplarken container
      // koyu/boş bir dikdörtgen olarak donuk kalıyordu (bkz. kullanıcı
      // ekran görüntüleri) — bu his "en hızlı ve kesintisiz" geçişin tam
      // tersiydi.
      //
      // ŞİMDİKİ YAKLAŞIM: iframe'i SADECE BİR KEZ oluşturuyoruz. Tema her
      // değiştiğinde iframe'i YOK ETMİYORUZ; bunun yerine giscus'un resmi
      // olarak desteklediği postMessage API'siyle iframe'in İÇİNDEKİ
      // React uygulamasına "setConfig: { theme }" gönderiyoruz
      // (bkz. https://giscus.app/tr#h-mesaj-ile-i̇letişim). Bu, iframe'i
      // hiç yeniden yaratmadığı için: (1) oturum/scroll pozisyonu
      // korunur, (2) hiçbir ara karede boş/koyu blok görünmez, (3) geçiş
      // olabilecek en hızlı şekilde (tek bir postMessage, DOM yeniden
      // kurulumu yok) gerçekleşir.
      let iframeKuruldu = false;

      function girisusIframeAl() {
        return document.querySelector("#giscus-container iframe.giscus-frame");
      }

      function girisusTemaGonder(tema) {
        const iframe = girisusIframeAl();
        if (!iframe || !iframe.contentWindow) return false;
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: tema } } },
          "https://giscus.app"
        );
        return true;
      }

      function girisusKur() {
        if (iframeKuruldu) return;
        iframeKuruldu = true;

        const container = document.getElementById("giscus-container");
        if (!container) return;

        const script = document.createElement("script");
        script.src = "https://giscus.app/client.js";
        script.setAttribute("data-repo", "{{ site.giscus.repo }}");
        script.setAttribute("data-repo-id", "{{ site.giscus.repo_id }}");
        script.setAttribute("data-category", "{{ site.giscus.category }}");
        script.setAttribute("data-category-id", "{{ site.giscus.category_id }}");
        script.setAttribute("data-mapping", "pathname");
        script.setAttribute("data-strict", "0");
        script.setAttribute("data-reactions-enabled", "1");
        script.setAttribute("data-emit-metadata", "0");
        script.setAttribute("data-input-position", "top");
        script.setAttribute("data-theme", guncelTema());
        script.setAttribute("data-lang", "tr");
        // NOT: Burada "lazy" DEĞİL "eager" kullanıyoruz. Script zaten
        // sadece container görünür alana girdiğinde (aşağıdaki
        // IntersectionObserver ile) DOM'a ekleniyor — yani "ne zaman
        // yükleneceği" kontrolü zaten bizde. "lazy" verirsek giscus'un
        // KENDİ dahili lazy-load mekanizması da devreye girip bizim
        // observer'ımızla ÇAKIŞIYOR ve iframe bazı durumlarda yarım/
        // eksik bir state'te (örn. sadece reactions barı render olmuş,
        // asıl yorum formu henüz gelmemiş) takılı kalabiliyor — ekran
        // görüntülerindeki koyu/boş dikdörtgenin olası bir nedeni budur.
        script.setAttribute("data-loading", "eager");
        script.setAttribute("crossorigin", "anonymous");
        script.async = true;

        container.appendChild(script);
      }

      // Tema değiştiğinde: iframe zaten kurulmuşsa sadece postMessage ile
      // GÜNCELLE (yıkıp yeniden kurma YOK). Henüz hiç kurulmadıysa
      // (kullanıcı daha yorumlara hiç kaydırmadı, "lazy" nedeniyle iframe
      // yok) yapacak bir şey yok — kurulduğunda zaten guncelTema()
      // GÜNCEL değeri okuyup doğru temayla açılacak.
      window.girisusTemaGuncelle = function () {
        if (!iframeKuruldu) return;
        girisusTemaGonder(guncelTema());
      };

      // "lazy" nedeniyle iframe ilk anda DOM'da olmayabilir. IntersectionObserver
      // ile container görünür alana girdiğinde script'i ekliyoruz — bu,
      // giscus'un kendi "lazy" mekanizmasıyla aynı tetikleyiciyi bizim
      // tarafımızdan da bilinçli şekilde başlatmamızı sağlıyor, böylece
      // iframeKuruldu bayrağını doğru anda true yapabiliyoruz.
      const container = document.getElementById("giscus-container");
      if (container) {
        new IntersectionObserver(function (entries, obs) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              girisusKur();
              obs.disconnect();
            }
          });
        }, { rootMargin: "200px" }).observe(container);
      }
    })();
  </script>
</div>
{% endif %}
