{% if site.giscus.repo_id and site.giscus.repo_id != "GISCUS_REPO_ID_BURAYA" %}
<div class="comments-section">
  <h2>Yorumlar</h2>
  <p class="format-hint">
    Yorum yapabilmek için GitHub hesabınla giriş yapman gerekiyor. Hiçbir
    ek kayıt/üyelik yok, sadece GitHub yetkilendirmesi yeterli.
  </p>
  <div id="giscus-container"></div>
  <script>
    (function () {
      // Sitenin o anki gerçek temasını kullanıyoruz, sabit değer değil.
      // Bu sayede iframe ilk yüklendiğinde bile doğru renkte başlıyor,
      // sonradan "flaşlamıyor". document.write yerine gerçek bir DOM
      // elemanı oluşturuyoruz — bazı tarayıcılar async script'lerle
      // birlikte document.write'ı kısıtlayabiliyor.
      function guncelTema() {
        return document.documentElement.getAttribute("data-theme") === "dark"
          ? "dark"
          : "light";
      }

      window.giscusTheme = guncelTema();

      const script = document.createElement("script");
      script.src = "https://giscus.app/client.js";
      script.setAttribute("data-repo", "{{ site.giscus.repo }}");
      script.setAttribute("data-repo-id", "{{ site.giscus.repo_id }}");
      script.setAttribute("data-category", "{{ site.giscus.category }}");
      script.setAttribute("data-category-id", "{{ site.giscus.category_id }}");
      script.setAttribute("data-mapping", "pathname");
      script.setAttribute("data-strict", "0");
      script.setAttribute("data-reactions-enabled", "1");
      script.setAttribute("data-emit-metadata", "1");
      script.setAttribute("data-input-position", "top");
      script.setAttribute("data-theme", window.giscusTheme);
      script.setAttribute("data-lang", "tr");
      script.setAttribute("data-loading", "lazy");
      script.setAttribute("crossorigin", "anonymous");
      script.async = true;

      document.getElementById("giscus-container").appendChild(script);

      // SORUN: "data-loading: lazy" yüzünden giscus'un iframe'i script
      // eklendiği anda değil, kullanıcı yorumlara kaydırdığında DOM'a
      // giriyor. Ayrıca iframe DOM'a girmiş olsa bile, giscus'un içindeki
      // uygulama kendi "message" dinleyicisini kaydedene kadar kısa bir
      // an var — bu arada gönderilen bir postMessage sessizce kayboluyor
      // (bilinen bir giscus/tarayıcı yarış durumu, bkz. giscus/giscus#1200).
      // Zamanlamayı TAHMİN ETMEK (sabit setTimeout) yerine, giscus'un
      // KENDİSİNİN gönderdiği ilk mesajı dinleyip, o mesajı aldığımız anda
      // temamızı gönderiyoruz. Bunun güvenilir çalışması için
      // "data-emit-metadata: 1" ŞART — "0" iken giscus parent'a hiç mesaj
      // göndermeyebiliyor, bu da "hazır" olduğunu asla öğrenemememize ve
      // temanın hiç senkronize olmamasına yol açabiliyordu. "1" yaptığımızda
      // giscus discussion verisini her yüklediğinde/güncellediğinde bize
      // mesaj yolluyor; biz bu mesajın İÇERİĞİYLE ilgilenmiyoruz (yorum
      // sayısı göstermiyoruz), sadece "artık kesin hazır" sinyali olarak
      // kullanıyoruz.
      let temaGonderildi = false;
      window.giscusHazir = window.giscusHazir || false;

      function iframeyeGonder(iframe) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: guncelTema() } } },
          "https://giscus.app"
        );
      }

      window.addEventListener("message", function (event) {
        if (event.origin !== "https://giscus.app") return;
        if (!(event.data && typeof event.data === "object" && event.data.giscus)) return;

        window.giscusHazir = true;

        const iframe = document.querySelector("#giscus-container iframe.giscus-frame");
        if (!iframe) return;

        // giscus'tan HERHANGİ bir mesaj geldiyse (ready sinyali, metadata,
        // tema onayı vs.) iframe kesinlikle mesaj dinlemeye hazır demektir.
        // Temamızı bu noktada göndermek, tahmine dayalı gecikmelerden
        // çok daha güvenilir.
        iframeyeGonder(iframe);
        temaGonderildi = true;
      });

      const containerGozlemci = new MutationObserver(function (mutations, obs) {
        const iframe = document.querySelector("#giscus-container iframe.giscus-frame");
        if (!iframe) return;

        // Güvenlik ağı: yukarıdaki "message" event'i her tarayıcıda /
        // her senaryoda beklendiği gibi tetiklenmeyebilir diye, iframe
        // DOM'a girdikten kısa bir süre sonra da (event gelmediyse) bir
        // deneme daha yapıyoruz. Event tabanlı senkronizasyon zaten
        // gerçekleştiyse (temaGonderildi true), tekrar göndermek zararsız.
        setTimeout(function () {
          if (!temaGonderildi) iframeyeGonder(iframe);
        }, 600);

        obs.disconnect();
      });

      containerGozlemci.observe(document.getElementById("giscus-container"), {
        childList: true,
        subtree: true,
      });
    })();
  </script>
</div>
{% endif %}
