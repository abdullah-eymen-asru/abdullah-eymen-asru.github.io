{% if site.giscus.repo_id and site.giscus.repo_id != "GISCUS_REPO_ID_BURAYA" %}
<div class="comments-section">
  <h2>Yorumlar</h2>
  <p class="format-hint">
    Yorum yapabilmek için GitHub hesabınla giriş yapman gerekiyor. Hiçbir
    ek kayıt/üyelik yok, sadece GitHub yetkilendirmesi yeterli.
  </p>
  <div id="giscus-container"></div>
  <script>
    (function () {
      // Sitenin o anki gerçek temasını kullanıyoruz, sabit değer değil.
      function guncelTema() {
        return document.documentElement.getAttribute("data-theme") === "dark"
          ? "dark"
          : "light";
      }

      // ÖNEMLİ NOT (koyu/açık tema geçişinde giscus'un bir kısmının eski
      // temada "donuk" kalması sorunu): Denenen ilk yaklaşım, tema
      // değiştiğinde giscus'un iframe'ine postMessage ile
      // "setConfig: { theme }" göndermekti. Bu, çoğu durumda çalışıyor
      // ama giscus'un KENDİ bilinen bir sınırlaması var (bkz.
      // giscus/giscus#1418): postMessage her zaman iframe içindeki React
      // uygulamasının TÜM parçalarını yeniden render etmiyor — özellikle
      // "reactions" (tepki) barı gibi bazı bölümler ilk yüklendiği
      // temada takılı kalabiliyor, sayfa yenilenene kadar düzelmiyor.
      // Yani bu sadece bizim kodumuzdaki bir eksiklik değil, giscus'un
      // kendi davranışından kaynaklanan bir kısıt.
      //
      // ÇÖZÜM: postMessage ile "güncellemeye çalışmak" yerine, tema
      // değiştiğinde giscus'un TÜMÜNÜ (script + iframe) yok edip, YENİ
      // temayla SIFIRDAN yeniden oluşturuyoruz. Bu, iframe içinde hiçbir
      // eski/yanlış temada state kalmamasını garanti ediyor çünkü her
      // şey en baştan, doğru temayla inşa ediliyor.
      window.girisusYenidenOlustur = function () {
        const container = document.getElementById("giscus-container");
        if (!container) return;

        // Önce konteyneri tamamen boşalt (eski script + eski iframe dahil).
        container.innerHTML = "";

        const script = document.createElement("script");
        script.src = "https://giscus.app/client.js";
        script.setAttribute("data-repo", "{{ site.giscus.repo }}");
        script.setAttribute("data-repo-id", "{{ site.giscus.repo_id }}");
        script.setAttribute("data-category", "{{ site.giscus.category }}");
        script.setAttribute("data-category-id", "{{ site.giscus.category_id }}");
        script.setAttribute("data-mapping", "pathname");
        script.setAttribute("data-strict", "0");
        script.setAttribute("data-reactions-enabled", "1");
        script.setAttribute("data-emit-metadata", "0");
        script.setAttribute("data-input-position", "top");
        script.setAttribute("data-theme", guncelTema());
        script.setAttribute("data-lang", "tr");
        // İlk yüklemede "lazy" kalsın (kullanıcı henüz yorumlara
        // kaydırmadıysa gereksiz yere hemen yüklemeyelim). Tema
        // DEĞİŞİRKEN yeniden oluşturuyorsak, kullanıcı zaten yorumlara
        // kaydırmış demektir (giscus daha önce görünür olmuştu) — o
        // durumda "eager" yükleyip flash'ı engelliyoruz.
        script.setAttribute("data-loading", window.giscusDahaOnceYuklendi ? "eager" : "lazy");
        script.setAttribute("crossorigin", "anonymous");
        script.async = true;

        container.appendChild(script);
      };

      // giscus'un iframe'i gerçekten DOM'a girdiğinde (lazy-load
      // tetiklendiğinde), bir sonraki tema değişiminde "eager" moda
      // geçebilmemiz için bunu işaretliyoruz.
      new MutationObserver(function (mutations, obs) {
        const iframe = document.querySelector("#giscus-container iframe.giscus-frame");
        if (iframe) {
          window.giscusDahaOnceYuklendi = true;
          obs.disconnect();
        }
      }).observe(document.getElementById("giscus-container"), {
        childList: true,
        subtree: true,
      });

      window.girisusYenidenOlustur();
    })();
  </script>
</div>
{% endif %}
